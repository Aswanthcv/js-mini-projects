<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TO DO LIST</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      background: linear-gradient(145deg, #0f172a, #1e293b, #334155);
      min-height: 100vh;
      font-family: Impact, 'Arial Narrow Bold', sans-serif;
      text-align: center;  
    }
    h1{
      padding: 30px;
      color:#e2e8f0;
    }
    .main{
      margin: auto;
      width: 40%;
      background-color: #1e293b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      border: #334155;
      border-radius: 25px;
      box-shadow: 10px 10px 15px #020617;
      gap: 15px;
    }
    .main input{
      padding: 8px;
      border-radius:8px;
      background:transparent;
      border: 1px solid rgba(255, 255, 255, 0.872);
      color: rgb(255, 255, 255);
      outline:none;
      flex:1;
    }
    .main input::placeholder{
      color: rgba(255, 255, 255, 0.781);
    }
    #add-btn{
      background-color: #3b82f6;
      color: #ffffff;
      font-weight: bold;
      padding: 10px 12px;
      border-radius: 8px;
      border:none;
    }
    #add-btn:hover{
      background-color: #2563eb;
      cursor: pointer;
    }
    .collect{
      display: flex;
      width: 100%;
      gap: 8px;
    }
    ol{
      padding-left: 20px;
    }
    li{
      border-bottom: 1px solid #425d7e;
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .list{
      color: #e2e8f0;
      text-align: left;
    }
    .list button{
      padding: 8px;
      border-radius: 5px;
      color: white;
      border: none;
    }
    .pending{
      background-color: rgb(241, 187, 10);
    }
    .pending:hover{
      background-color: rgb(208, 160, 4);
    }
    .completed{
      background-color: rgb(0, 193, 0);
    }
    .completed:hover{
      background-color: rgb(1, 155, 1);
    }
    .dlt-btn{
      background-color: rgb(249, 1, 1);
    }
    .dlt-btn:hover{
      background-color: rgb(202, 0, 0);
    }
    .done-text{
      text-decoration: line-through;
    }
    li div{
      display:flex;
      gap: 10px;
    }

    /* theme button */
    .theme-btn{
      background-color: #e2e8f0;
      color: #0f172a;
      padding: 6px 8px;
      border-radius: 10px;
      border:none;
      box-shadow: 0px 0px 35px rgba(255, 255, 255, 0.675);
      margin-top: 30px;
      cursor: pointer;
      position: fixed;
      bottom: 30px;
      right: 30px;
    }

    body.light{
      background: linear-gradient(to bottom, #d2e7fd, #e2e8f0);
      color: black;
    }
    .light h1{
      color: #0f172a;
    }
    .light .main{
      background-color: #ffffff;
      border:1px solid #cbd5e1;
      box-shadow: 8px 8px 20px rgba(0,0,0,0.1);
    }
    .light input{
      background-color: #f8fafc;
      border: 1px solid #94a3b8;
      color: #0f172a;
    }
    .light input::placeholder{
      color: #64748b;
    }
    .light .theme-btn{
      background-color: #12356c;
      color: white;
      box-shadow: 0px 0px 25px #243b55;
    }
    .light li{
      border-bottom: 1px solid #cbd5e1;
    }
    .light .list{
      color: #0f172a;
    }

    
    @media (max-width: 768px) {
      .main{
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <h1>TO DO LIST</h1>
  <div class="main">
    <div class="collect">
      <input type="text" id="input" placeholder="Enter Task">
     <button id="add-btn" onclick="createTask()">ADD</button>
    </div>
    <div class="list">
      <ol id="taskList"></ol>
    </div>

  </div>

  <button class="theme-btn" id="themeBtn" onclick="themeChange()">Light</button>
<script>
  function createTask(){
    let input = document.getElementById("input");
    let list = document.getElementById("taskList");

    let task = document.createElement("li");
    
    let textSpan = document.createElement("div");
    textSpan.textContent = input.value;

    let btnContaier = document.createElement("div");

    let doneBtn = document.createElement("button");
    doneBtn.textContent="Pending";
    doneBtn.classList.add("pending");

    let dltBtn = document.createElement("button");
    dltBtn.textContent="Delete";
    dltBtn.classList.add("dlt-btn");

    doneBtn.onclick=function(){
      // textSpan.classList.toggle("done-text");
      if (doneBtn.textContent === "Pending"){
        doneBtn.textContent = "Completed";
        doneBtn.classList.add("completed");
        textSpan.classList.add("done-text"); 
      }
      else{
        doneBtn.textContent="Pending";
        doneBtn.classList.remove("completed");
        doneBtn.classList.add("pending")
        textSpan.classList.remove("done-text");
      }
    }
    dltBtn.onclick=function(){
      task.remove();
    }

    if( input.value === ""){
      alert("Empty !!!");
      return;
    }

    btnContaier.appendChild(doneBtn);
    btnContaier.appendChild(dltBtn);
    task.appendChild(textSpan);
    task.appendChild(btnContaier);
    list.appendChild(task);

    input.value="";
  }

  function themeChange(){
    let body=document.body;
    let tbutton=document.getElementById("themeBtn");

    if(body.classList.toggle("light")){
      tbutton.textContent="Dark";
    }
    else{
      tbutton.textContent="Light";
    }
  }
</script>

</body>
</html>
