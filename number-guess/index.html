<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find the number</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 50px;
      background:linear-gradient(white 0%,rgb(200, 202, 255) 77%);
      background-attachment: fixed;
    }
    .main{
      padding: 10px;
      display: flex;
      flex-direction:column;
      gap: 15px;
      width: 20%;
      margin: auto;
    }
    .main input{
      padding: 10px;
    }
    input:focus{
      outline: 1px solid #6d72ff;
    }
    .main button{
      padding: 8px;
      border: none;
      border-radius: 5px;
      transition: 0.2s;
      box-shadow: 0px 0px 10px    rgb(107, 110, 255);
      letter-spacing: 1.4;
      font-size: 1rem;
      cursor: pointer;
    }
    p{
      font-size: 20px;
      letter-spacing: 1.2;
    }
    #guessButton{
      background-color: #6d72ff;
      color: white;
    }
    #guessButton:hover{ 
      background-color: rgb(73, 79, 255);
    }
    #guessButton:disabled {
      background-color: #999;
      cursor: not-allowed;
      box-shadow: none;
      opacity: 0.6;
    }
    #resetButton{
      background-color: rgb(255, 75, 75);
      color: white;
    }
    #resetButton:hover{
      background-color: rgba(235, 0, 0, 0.745);
    }
    .try-color{
      color: red;
      font-weight: bold;
    }

   @media (max-width: 600px) {
    .main{
      width: 80%;
      
    }
   }
  </style>
</head>
<body>
  <h2>Guess The Number</h2>
  <div class="main">
    <input type="number" placeholder="enter your guess" id="input">
    <button id="guessButton">Guess</button>
    <button id="resetButton">Reset</button>
    <p id="message"></p>
    <!-- <p id="tries"></p> -->
  </div>
</body>

<script>
  let randomNumber = Math.floor(Math.random()*100)+1;
  // console.log("Random number:",randomNumber);

  let input = document.getElementById("input");
  let button = document.getElementById("guessButton");
  let message = document.getElementById("message");
  let resetBtn = document.getElementById("resetButton");
  // let triesDisplay = document.getElementById("tries");

  input.focus();

  let tries = 0;

  button.addEventListener("click",function (){
    let userGuess = Number(input.value);

    if (input.value === ""){
      message.textContent = "Enter Your Guess first.";
      return;
    }
    if (userGuess < 1 || userGuess > 100) {
      message.textContent = "Enter a number between 1 and 100";
      return;
    }

    tries++;
    // triesDisplay.textContent = "Guesses: " + tries;

    if (userGuess === randomNumber){
      message.innerHTML = `You GOT IT 🎉 in <span class="try-color">${tries}</span> tries!`;
      button.disabled = true;
      input.disabled = true;
    }
    else if (userGuess>randomNumber){
      message.textContent = "Your guess is HIGH 🔺";
    }
    else{
      message.textContent = "Your guess is LOW 🔻";
    }

    input.value = "";
    input.focus();

  });

  resetBtn.addEventListener("click", function(){
    randomNumber = Math.floor(Math.random()*100)+1;
    // console.log("new number:",randomNumber);
    input.value = "";
    message.textContent = "";
    tries = 0;
    // triesDisplay.textContent="";
    button.disabled = false;
    input.disabled = false;
    input.focus();
  })
</script>
</html>
